name: Android Build

on:
  push:
    branches:
      - build-*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          if [ ! -f "app/release.keystore" ]; then
            keytool -genkey -v -keystore app/release.keystore -alias "key0" -keyalg RSA -keysize 2048 -validity 10000 -storepass "android" -keypass "android" -dname "CN=WebViewForge, OU=SaaS, O=WebViewForge, L=Unknown, S=Unknown, C=BR"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Build Release APK
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk